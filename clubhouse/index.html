<!DOCTYPE html>
<html>
  <head>
    <meta name="hyperlinkvr" content="supported" />
    
    <script data-cfasync="false">
      hyperlinkvr.on_ready(async () => {
        await hyperlinkvr.connect();
        console.log("Connected!");
        
        const h = hyperlinkvr.builders;

        const promises = [];

        promises.push(
            new h.WorldEnvBuilder()
            .set_sky(new h.WorldSkyBuilder()
                    .set_sky_horizon_color(0xfbffb8)
                    .set_sun_direction([-0.8, 0.3, 0.7])
                    .set_sun_intensity(1.2)
                    .set_sun_size(1)
                    .set_sun_glow(8)
                    .set_sun_color(0xffe198)
                    .set_light_intensity(1.5)
                    .set_sky_light_intensity(0.3)
                    .build()
            )
            .apply()
        );
        
        const interior = new h.CustomObjectBuilder()
            .set_mesh("https://hyperlink.surf/clubhouse/visual.glb")
            .set_physics(new h.PhysicsSystemBuilder()
                .set_rigid_body(new h.FixedRigidBodyBuilder()
                    .set_collider(new h.ColliderBuilder()
                        .custom_mesh("https://hyperlink.surf/clubhouse/colliders.glb", "trimesh")
                        .build()
                    )
                    .build()
                )
            .build()
        )
        .build();

        promises.push(
            new h.EngineObjectDispatchBuilder()
                    .set_object(interior)
                    .create()
        );

        const ball = new h.StandardPrefabBuilder("basketball").build()

        promises.push(
            new h.EngineObjectDispatchBuilder()
                    .set_object(ball)
                    .set_position(0, 1.5, -10)
                    .create()
        );

        const hoop = new h.BasketballHoopPrefabBuilder().named("hoop").build()

        promises.push(
            new h.EngineObjectDispatchBuilder()
                    .set_object(hoop)
                    .set_position(1.25,3.505,-11.87) // regulation height!
                    .on("hoop", () => {
                      document.getElementById("score").innerText = parseInt(document.getElementById("score").innerText) + 1;
                    })
                    .create()
        );

        const av_mirror = new h.StandardPrefabBuilder("avatar_mirror").build();
        promises.push(
            new h.EngineObjectDispatchBuilder()
                    .set_object(av_mirror)
                    .set_position(-5, 0, 11.95)
                    .set_euler_rotation(0, Math.PI, 0)
                    .create()
        );

        const skootballs = [];

        const skoot = new h.StandardPrefabBuilder("skootball").build();

        skootballs.push(new h.EngineObjectDispatchBuilder().set_object(skoot).set_position(-14,0,-10.5).create());
        skootballs.push(new h.EngineObjectDispatchBuilder().set_object(skoot).set_position(-12.75,0,-10.5).create());
        skootballs.push(new h.EngineObjectDispatchBuilder().set_object(skoot).set_position(-11.5,0,-10.5).create());
        skootballs.push(new h.EngineObjectDispatchBuilder().set_object(skoot).set_position(-10,0,-10.5).create());
        skootballs.push(new h.EngineObjectDispatchBuilder().set_object(skoot).set_position(-8.5,0,-10.5).create());

        promises.push(...skootballs);

        promises.push(hyperlinkvr.players.get_current_player().teleport_to([0, 0, 10.5], 0));

        await Promise.all(promises);
        hyperlinkvr.finished_loading();
      });
    </script>

    <link rel="icon" href="/hyperlinkvr_anim.svg" type="image/svg+xml">
  </head>
  <body>
    🏠

    Times scored on the basketball hoop: <span id="score">0</span>
  </body>
</html>
