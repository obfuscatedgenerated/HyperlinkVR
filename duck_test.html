<!DOCTYPE html>
<html>
  <head>
    <meta name="hyperlinkvr" content="supported" />
    
    <script data-cfasync="false">
      (async () => {
        await hyperlinkvr.wait_for_ready();

        await hyperlinkvr.connect();
        console.log("Connected!");
        
        const h = hyperlinkvr.builders;
        
        const duck = new h.CustomObjectBuilder()
            .set_mesh("https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/refs/heads/main/2.0/Duck/glTF-Binary/Duck.glb")
            .set_physics(new h.PhysicsSystemBuilder()
                .set_rigid_body(new h.DynamicRigidBodyBuilder()
                    .set_collider(new h.ColliderBuilder().auto().build())
                    .set_mass(0.2)
                    .build()
                )
            .build()
        )
        .add_interaction("squeak", new h.GrabbableInteractionBuilder()
            .reports_grabs() // now recieves events when object grabbed
            .build()
        )
        .add_interaction("sound", new h.PositionalAudioInteractionBuilder()
            .set_url("https://www.myinstants.com/media/sounds/squeak_Q72c7Tg.mp3")
            .set_max_distance(1)
            .build()
        )
        .build();

        const created_duck = await new h.EngineObjectDispatchBuilder()
            .set_object(duck)
            .set_position(0, 10, -2)
            .on("squeak", async () => {
                await created_duck.interactions.sound.seek(0);
                await created_duck.interactions.sound.play();
            })
            .create();
        
        console.log("Created duck object with ID:", created_duck.object.id);

        hyperlinkvr.finished_loading();
      })();
    </script>

    <link rel="icon" href="/hyperlinkvr_anim.svg" type="image/svg+xml">
  </head>
  <body>
    quack quack :)
  </body>
</html>
